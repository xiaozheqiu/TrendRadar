name: Get Hot News

on:
  schedule:
    - cron: "33 * * * *"
  workflow_dispatch:

concurrency:
  group: crawler-retry-${{ github.run_id }}
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          clean: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install dependencies
        run: uv sync --frozen --no-dev

      - name: Verify required files
        run: |
          if [ ! -f config/config.yaml ]; then
            echo "Error: Config missing"
            exit 1
          fi

      - name: Run crawler
        env:
          GITHUB_ACTIONS: true
        run: uv run python -m trendradar

      - name: Prepare site files
        run: |
          test -f index.html
          rm -rf site
          mkdir -p site/latest
          cp index.html site/index.html
          if [ -d output/html/latest ]; then
            cp -R output/html/latest/. site/latest/
          fi
          if [ -d output/html ]; then
            mkdir -p site/history
            cp -R output/html/. site/history/
          fi
          touch site/.nojekyll

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
